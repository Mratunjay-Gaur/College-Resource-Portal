  <!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Join Technical Club</title>
    <link rel="stylesheet" href="/Join-Club.css" />
  </head>
  <body>
    <div class="background">
      <span class="orb"></span>
      <span class="orb"></span>
      <span class="orb"></span>
      <span class="orb"></span>
    </div>

    <div class="card">
      <h2>Join Technical Club</h2>
      <form action="/Join-Club  " method="post">
        <div class="field">
          <label for="name">Name</label>
          <input name="name" id="name" placeholder="Full Name" required />
        </div>
        <div class="field">
          <label for="email">Email</label>
          <input name="email" id="email" type="email" placeholder="Email Address" required />
        </div>
        <div class="field">
          <label for="branch">Branch</label>
          <input name="branch" id="branch" placeholder="Branch / Department" />
        </div>
        <button type="submit">Join Now</button>
      </form>
    </div>
  </body>
  </html>
